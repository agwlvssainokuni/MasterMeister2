spring:
  application:
    name: mastermeister
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/mastermeister}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=5m
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:no-reply@mastermeister.local}
    properties:
      mail:
        smtp:
          connectiontimeout: 5000
          timeout: 5000

mm:
  app:
    jwt:
      secret: ${MM_APP_JWT_SECRET:dev-only-secret-please-override-in-production-32bytes}
      access-token-expiry: 10m
      refresh-token-expiry: ${MM_APP_JWT_REFRESH_TOKEN_EXPIRY:24h}
    audit:
      default-page-size: 20
      page-size-options: 20,50,100
    master-data:
      default-page-size: 50
      page-size-options: 50,100,200
      query-timeout: 30s
      max-mutation-batch-size: 500
      large-record-threshold: 100
    security:
      password-encoder-strength: ${MM_APP_SECURITY_PASSWORD_ENCODER_STRENGTH:10}
    user-registration:
      token-expiry: ${MM_APP_USER_REGISTRATION_TOKEN_EXPIRY:3h}
    admin:
      bootstrap:
        email: ${MM_APP_ADMIN_BOOTSTRAP_EMAIL:}
        password: ${MM_APP_ADMIN_BOOTSTRAP_PASSWORD:}
    frontend:
      base-url: ${MM_APP_FRONTEND_BASE_URL:http://localhost:5173}
    rdbms-connection:
      encryption-key: ${MM_APP_RDBMS_CONNECTION_ENCRYPTION_KEY}
      pool:
        maximum-pool-size: ${MM_APP_RDBMS_CONNECTION_POOL_MAXIMUM_POOL_SIZE:5}
        minimum-idle: ${MM_APP_RDBMS_CONNECTION_POOL_MINIMUM_IDLE:0}
        connection-timeout: ${MM_APP_RDBMS_CONNECTION_POOL_CONNECTION_TIMEOUT:5000ms}
    query-builder:
      parse-max-length: 10000
      parse-timeout: 5s
      parse-executor-pool-size: 4
      max-select-items: 100
      max-join-items: 10
      max-where-conditions: 30
      max-group-by-columns: 30
      max-having-conditions: 20
      max-order-by-items: 20
    query-history:
      default-page-size: 50
      page-size-options: 50,100,200
    query-execution:
      query-timeout: 30s
      sql-max-length: 10000
      parse-timeout: 5s
      parse-executor-pool-size: 4
      max-result-rows: 1000